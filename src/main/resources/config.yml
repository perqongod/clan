prefix: "&6&lxyntrix &7| "
clansystem-prefix: "&4[ClanSystem]&r "
kill-points: 1
online-save-interval: 60

clan:
  max-members: 10

war:
  cost-points: 200
  cooldown-minutes: 30
  duration-minutes: 10
  winner-points: 100
  loser-points: 100

cooldowns:
  invite-seconds: 10
  request-seconds: 5

