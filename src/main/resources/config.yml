prefix: "&b[Xyntrix]&r "
clansystem-prefix: "&4[ClanSystem]&r "
# Points awarded to a clan per kill (ranking/points)
kill-points: 1
online-save-interval: 60

# Clan tag validation
clan-tag-settings:
  min-length: 3
  max-length: 4
  only-letters: false
  blacklist:
    - "ADMIN"
    - "MODS"
    - "TEST"
    - "BANNED"

max-members: 10
min-points: 0
max-points: 10000

war:
  cost: 200
  cooldown-minutes: 30
  arena-countdown-seconds: 600
  start-countdown-seconds: 10
  request-timeout-seconds: 30
  invite-timeout-seconds: 30
  ready-timeout-seconds: 30
  teleport-timeout-seconds: 30
  command-allowlist:
    - "/help"
    - "/logout"
    - "/quit"
    - "/clan"
    - "/war"

messages:
  toggle-off: "%prefix%&cYou are no longer accepting clan invitations."
