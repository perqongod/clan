skills-gui:
  rows: 5
  title: "&8Clan Skills"
  filler:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
    slots: []
  accent:
    material: RED_STAINED_GLASS_PANE
    name: " "
    slots: []
  overview:
    slot: 40
    material: NETHER_STAR
    name: "&6Clan Skills"
    lore:
      - "&7Unlock Points: &f%skill_points%"
      - "&7Leaderboard Points: &f%clan_points%"
      - "&7Next unlock at: &f%next_unlock%"
      - "&7Next reward: &f%next_reward%"
      - "&7Bonus slots: &f+%bonus_slots%"
      - "&7Gain +1 member slot every %bonus_step% points after %spawn_unlock%"
      - "&eProgress is automatic"
  navigation:
    previous:
      slot: 36
      material: ARROW
      name: "&ePrevious"
    next:
      slot: 44
      material: ARROW
      name: "&eNext"
  skills:
    slots: [11, 19, 28, 29, 30, 21, 12, 13, 14, 23, 31, 32, 33]
    locked:
      material: RED_STAINED_GLASS_PANE
      name: "&cLevel %level%"
    chest:
      material: CHEST
      name: "&6Clan Chest"
      lore:
        - "&7%reward%"
      locked:
        lore:
          - "&7use clan chest"
    spawn:
      material: ENDER_EYE
      name: "&6Clan Spawn"
      lore:
        - "&7%reward%"
      locked:
        lore:
          - "&7use clan spawn"
    rename:
      material: NAME_TAG
      name: "&6Clan Rename"
      lore:
        - "&7%reward%"
      unlocked-lore:
        - "&7Cooldown: &f72h"
        - "&7Click to rename (colors enabled)"
      locked:
        lore:
          - "&7use clan rename"
          - "&7with colors"
    enderpearl:
      material: ENDER_PEARL
      name: "&6Ender Pearl Shield"
      lore:
        - "&7%reward%"
      locked:
        lore:
          - "&7enderperle shield"
    rally:
      material: BEACON
      name: "&6Clan Rally"
      lore:
        - "&7%reward%"
      unlocked-lore:
        - "&7Cooldown: &f30m"
        - "&7Teleport all members to the leader"
      locked:
        lore:
          - "&7use clan rally"

quest-gui:
  title: "clan quests"
  overview:
    name: "&6clan quests"
  navigation:
    previous:
      name: "&eprevious"
    next:
      name: "&enext"

settings-gui:
  titles:
    main: "Clan Settings"
    chest: "Clan Chest Settings"
    friendly-fire: "Clan Friendly Fire Settings"
    skills: "Clan Skills Settings"
    spawn: "Clan Spawn Settings"
  items:
    clan-chest:
      name: "&6Clan Chest"
    friendly-fire:
      name: "&6Friendly Fire"
    clan-skills:
      name: "&6Clan Skills"
    clan-spawn:
      name: "&6Clan Spawn"
    invitations:
      name: "&6Invitations"

ranks:
  Bronze: 0
  Silver: 5
  Gold: 10
  Platinum: 11
  Diamond: 12

  help-book:
  title: "Clan Hilfe"
  author: "Clan System"
  pages:
    - |-
      &6&lClan Hilfe
      &7Erste Schritte:
      &f/clan create <tag>
      &f/clan invite <spieler>
      &f/clan leave
      &f/clan info
      &f/clan request <tag>
      &f/clan requests
    - |-
      &6&lVerwaltung
      &f/clan kick <spieler>
      &f/clan promote <spieler>
      &f/clan demote [spieler]
      &f/clan leader <spieler>
      &f/clan rename <tag>
      &f/clan chest (set)
      &f/clan spawn
      &f/clan setspawn
      &f/clan delspawn
      &f/clan settings
      &f/clan skills
      &f/clan quest
      &f/clan logs
