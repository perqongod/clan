  clan-chat-format: "&e[ᴄʟᴀɴꜱʏꜱᴛᴇᴍ] &f%player%&7: &f%message%"
  clan-info-header: "&#FFFF00ᴄʟᴀɴ ɪɴꜰᴏʀᴍᴀᴛɪᴏɴ"
