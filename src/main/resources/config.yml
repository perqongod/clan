prefix: "&b[Xyntrix]&r "
clansystem-prefix: "&4[ClanSystem]&r "
kill-points: 1
online-save-interval: 60

# Clan-Tag Validierung
clan-tag-settings:
  min-length: 3
  max-length: 8
  only-letters: false
  blacklist:
    - "ADMIN"
    - "MODS"
    - "TEST"
    - "BANNED"

max-members: 10

war:
  cost: 200
  cooldown-minutes: 30
  arena-countdown-seconds: 600

