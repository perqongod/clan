prefix: "&b[Xyntrix]&r "
clansystem-prefix: "&4[ClanSystem]&r "
# Points awarded to a clan per kill (ranking/points)
kill-points: 1
online-save-interval: 60

# Clan tag validation
clan-tag-settings:
  min-length: 4
  max-length: 4
  only-letters: false
  blacklist:
    - "ADMIN"
    - "MODS"
    - "TEST"
    - "BANNED"

max-members: 10
min-points: 0
max-points: 10000

messages:
  toggle-off: "%prefix%&cYou are no longer accepting clan invitations."
  toggle-on: "%prefix%&aYou are now accepting clan invitations again."
  clan-chat-format: "&e[ᴄʟᴀɴꜱʏꜱᴛᴇᴍ] &f%player%&7: &f%message%"
  clan-info-header: "&#FFFF00ᴄʟᴀɴ ɪɴꜰᴏʀᴍᴀᴛɪᴏɴ"
  no-clan: "%prefix%&cYou are not in a clan."
  clan-created: "%prefix%&aClan %tag% has been created."
  clan-deleted: "%prefix%&aClan has been deleted."
  invitation-sent: "%prefix%&aInvitation sent to %player%."
  invitation-received: "%prefix%&aYou have been invited by %inviter% to join the clan %tag%"
  invitation-accepted: "%prefix%&aYou have joined the clan %tag%."
  invitation-denied: "%prefix%&cInvitation declined."
  left-clan: "%prefix%&aYou have left the clan."
  kicked: "%prefix%&cYou were kicked from the clan."
  promoted: "%prefix%&a%player% has been promoted to MOD."
  demoted: "%prefix%&a%player% has been demoted."
  renamed: "%prefix%&aClan has been renamed to %tag%."
  no-permission: "%prefix%&cYou don't have permission to do that."
  leader-disallow: "%prefix%&cYou don't have access to interact with the clan chest."
  player-not-found: "%prefix%&cPlayer not found."
  clan-not-found: "%prefix%&cClan not found."
  already-in-clan: "%prefix%&cYou are already in a clan."
  clan-full: "%prefix%&cThe clan is full (max. %max% members)."
  clan-exists: "%prefix%&cA clan with this tag already exists."
  invitations-disabled: "%prefix%&cThis player has disabled invitations."
  tag-invalid-length: "%prefix%&cThe clan tag must be exactly %length% characters."
  tag-invalid-chars: "%prefix%&cThe clan tag may only contain letters and numbers."
  tag-blacklisted: "%prefix%&cThis clan tag is not allowed."
  tag-no-colors: "%prefix%&cYou may not use color codes. Purchase VIP for colored tags!"
  tag-vip-only-gold: "%prefix%&cAs VIP you may only use the &6&6 &ccolor code."
  tag-vip-invalid-codes: "%prefix%&cInvalid color codes in tag. Use only valid Minecraft color codes (e.g. &a&a, &6&6, &c&c)."
  tag-vip-max-length: "%prefix%&cThe clan tag must be exactly %length% characters."
  disband-confirm: "&cAre you sure you want to delete the clan?"
  disband-denied: "%prefix%&cClan deletion cancelled."
  disband-cancelled: "%prefix%&cClan deletion cancelled (timed out)."
  clan-dissolved: "%prefix%The [%tag%] clan has been disbanded."
  # kept for backward compat
  delete-pending: "%prefix%The [%tag%] clan will be disbanded upon confirmation."
  delete-confirm: "&cAre you sure you want to delete the clan?"
  delete-denied: "%prefix%&cClan deletion cancelled."
  clan-deleted-cancelled: "%prefix%&cClan deletion cancelled (timed out)."
  not-clan-leader: "%prefix%&cYou are not the clan leader."
  leader-cannot-join: "%prefix%&cAs a leader you cannot join another clan. Transfer leadership or delete your clan first."
  force-leave-success: "%prefix%&a%player% has been removed from the clan."
  force-leave-no-clan: "%prefix%&cThis player is not in a clan."
  no-requests: "%prefix%&cYou have no pending clan requests."
  join-not-invited: "%prefix%&cYou have not been invited to this clan."
  request-sent: "%prefix%&aYour request has been sent to clan %tag%."
  request-received: "%csprefix%&aYou have received a clan request"
  requests-header: "%prefix%Incoming clan requests:"
  requests-only-leader: "%prefix%&cOnly the clan leader can view incoming requests."
  requests-empty: "%prefix%&cNo open requests."
  request-already-sent: "%prefix%&cYou have already sent a request to this clan."
  request-betrayal: "%prefix%&cWhy do you want to betray your clan?"
  skills-upgraded: "%prefix%&aClan skills upgraded to level %level% (cost: %cost% points)."
  skills-not-enough-points: "%prefix%&cYou need %cost% points to upgrade. You have %points%."
  skills-auto-progress: "%prefix%&aClan Fortschritt basiert auf Punkten."
  skills-locked-chest: "%prefix%&cClan Chest ist gesperrt. Benötigt %required% Punkte."
  skills-locked-spawn: "%prefix%&cClan Spawn ist gesperrt. Benötigt %required% Punkte."
  skills-locked-setspawn: "%prefix%&cClan Spawn ist gesperrt. Benötigt %required% Punkte."
  skills-locked-rename: "%prefix%&cClan Rename ist gesperrt. Benötigt %required% Punkte."
  quest-info: "%prefix%Quest points affect clan skills, not ranking."
  chest-set: "%prefix%&aClan Chest gesetzt!"
  chest-not-set: "%prefix%&cClan Chest wurde noch nicht gesetzt."
  spawn-set: "%prefix%&aClan Spawn gesetzt!"
  spawn-deleted: "%prefix%&aClan spawn removed."
  spawn-not-set: "%prefix%&cClan spawn is not set."
  spawn-teleporting: "%prefix%&aTeleportiere..."
  spawn-teleported: "%prefix%&aTeleportiert."
  rename-too-soon: "%prefix%&cDu kannst deinen Clan erst in %hours%h erneut umbenennen. (Cooldown: %required%h)"
  clan-info-playtime: "%prefix%Gesamtspielzeit: %hours%h"
  leader-request-confirm: "%prefix%&cDo you really want to leave your clan to join another?"
  force-kick-confirm: "%prefix%&cAre you sure you want to remove %player% from their clan?"
  force-delete-confirm: "%prefix%&cAre you sure you want to disband the clan %tag%?"
  promote-only-mod: "%prefix%&cYou can only promote players up to MOD. Use /clan leader <player> to transfer leadership."
  leader-transferred: "%prefix%&aLeadership has been transferred to %player%."
  leader-received: "%prefix%&aYou are now the leader of clan %tag%."
  settings-leader-chest: "%prefix%&cDer Clan-Leader hat immer Zugriff auf die Clan Chest."
  settings-leader-friendly-fire: "%prefix%&cDer Clan-Leader hat Friendly Fire immer aktiviert."
  settings-leader-skills: "%prefix%&cDer Clan-Leader hat immer Zugriff auf die Clan Skills."
  settings-leader-spawn: "%prefix%&cDer Clan-Leader hat immer Zugriff auf den Clan Spawn."
  invite-cooldown: "%prefix%&cPlease wait %seconds% more seconds before sending another invite."
  invite-max-open: "%prefix%&cThis player already has an open invitation."
  target-in-clan-inviter: "%prefix%&c%player% is already in a clan [notification sent]"
  target-in-clan-notify: "%csprefix%&aYou have a new notification."
  admin-points-no-op: "%prefix%&cDu brauchst OP-Rechte für diesen Befehl."
  admin-points-not-found: "%prefix%&cSpieler/Clan nicht gefunden."
  admin-points-add: "%prefix%Du hast dem [%tag%] Clan %amount% Punkte hinzugefügt. Neuer Stand: %total%."
  admin-points-remove: "%prefix%Du hast dem [%tag%] Clan %amount% Punkte entfernt. Neuer Stand: %total%."
  admin-points-set: "%prefix%Du hast die Punkte des [%tag%] Clans auf %amount% gesetzt."

ranks:
  Bronze: 0
  Silver: 5
  Gold: 10
  Platinum: 11
  Diamond: 12

  help-book:
  title: "Clan Hilfe"
  author: "Clan System"
  pages:
    - |-
      &6&lClan Hilfe
      &7Erste Schritte:
      &f/clan create <tag>
      &f/clan invite <spieler>
      &f/clan leave
      &f/clan info
      &f/clan request <tag>
      &f/clan requests
    - |-
      &6&lVerwaltung
      &f/clan kick <spieler>
      &f/clan promote <spieler>
      &f/clan demote [spieler]
      &f/clan leader <spieler>
      &f/clan rename <tag>
      &f/clan chest (set)
      &f/clan spawn
      &f/clan setspawn
      &f/clan delspawn
      &f/clan settings
      &f/clan skills
      &f/clan quest
      &f/clan logs
