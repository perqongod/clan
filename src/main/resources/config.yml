ranks:
  Bronze: 0
  Silver: 5
  Gold: 10
  Platinum: 11
  Diamond: 12

help-book:
  title: "Clan Hilfe"
  author: "Clan System"
  pages:
    - |-
      &6&lClan Hilfe
      &7Erste Schritte:
      &f/clan create <tag>
      &f/clan invite <spieler>
      &f/clan join <tag>
      &f/clan leave
      &f/clan info
      &f/clan request <tag>
      &f/clan requests
    - |-
      &6&lVerwaltung
      &f/clan kick <spieler>
      &f/clan promote <spieler>
      &f/clan demote [spieler]
      &f/clan leader <spieler>
      &f/clan rename <tag>
      &f/clan chest (set)
      &f/clan bank
      &f/clan bank add [betrag]
      &f/clan spawn
      &f/clan setspawn
      &f/clan skills
      &f/clan logs
    - |-
      &6&lClan War
      &f/clan war <tag>
      &f/clan war info
      &f/clan war accept <tag>
      &f/clan war deny <tag>
      &f/clan war team

# War arenas (set via /clan war setarena a/b)
arenas: []
